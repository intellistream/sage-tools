# ruff.toml — standalone ruff configuration for sage-tools

target-version = "py311"
line-length = 100

extend-exclude = [
    "build",
    "dist",
    ".venv",
    "venv",
    ".git",
    "*.egg-info",
]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line length (handled by formatter)
    "B008",  # do not perform function calls in argument defaults
]

[lint.isort]
known-first-party = ["sage"]

[format]
quote-style = "double"
indent-style = "space"
