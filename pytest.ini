[pytest]
testpaths = tests src
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --color=yes
pythonpath =
    src
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    fast: Fast tests
    network: Network tests (require internet)
    smoke: Smoke tests (quick validation)
